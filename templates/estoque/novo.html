{% extends "base.html" %}

{% block content %}

<link rel="stylesheet" href="{{ url_for('static', filename='css/estoque_form.css') }}">

<h2>Cadastrar Material</h2>

{% if erro %}
<p class="form-alert">{{ erro }}</p>
{% endif %}

<form class="form-estoque" method="post">

<div class="form-group">
<label>Tipo</label>
<select name="categoria" required>
<option value="">Selecione</option>
<option value="Adesivo">Adesivo</option>
<option value="Lona">Lona</option>
<option value="Tecido">Tecido</option>
</select>
</div>

<div class="form-group">
<label>Nome do material</label>
<input type="text" name="nome" placeholder="Ex: Lona Translúcida" required>
</div>

<div class="form-group">
<label>Largura (m)</label>
<input type="number" name="largura_m" step="0.01" min="0.01" placeholder="Ex: 1,10" required>
</div>

<div class="form-group">
<label>Unidades iniciais</label>
<input type="number" name="unidades" min="1" step="1" value="1" required>
</div>

<p class="form-help">Cada unidade cadastrada cria um rolo com 50m disponíveis.</p>

<div class="acoes">
<button class="btn" type="submit">Salvar</button>
<a href="/estoque" class="btn-cancelar">Cancelar</a>
</div>

</form>

{% endblock %}

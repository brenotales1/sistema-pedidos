{% extends "base.html" %}

{% block content %}

<link rel="stylesheet" href="{{ url_for('static', filename='css/cliente_form.css') }}">

<h2>Editar Cliente</h2>

{% if erro %}
<p class="form-alert">{{ erro }}</p>
{% endif %}

<form class="form-cliente" method="post" action="{{ url_for('cliente.editar_cliente', id=cliente.id) }}">

<div class="form-group">
<label>Nome</label>
<input type="text" name="nome" value="{{ form_data.nome }}" required>
</div>

<div class="form-group">
<label>Telefone</label>
<input type="text" name="telefone" value="{{ form_data.telefone }}">
</div>

<div class="form-group">
<label>Empresa</label>
<input type="text" name="empresa" value="{{ form_data.empresa }}">
</div>

<div class="acoes">

<button class="btn">Salvar Alterações</button>

<a href="/clientes" class="btn-cancelar">Cancelar</a>

</div>

</form>

{% endblock %}

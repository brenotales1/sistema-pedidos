{% extends "base.html" %}

{% block content %}

<link rel="stylesheet" href="{{ url_for('static', filename='css/cliente_form.css') }}">

<div class="cliente-page">

<h2>Novo Cliente</h2>

{% if erro %}
<p class="form-alert">{{ erro }}</p>
{% endif %}

<form class="form-cliente" method="post" action="{{ url_for('cliente.novo_cliente') }}">

<div class="form-group">
<label>Nome</label>
<input type="text" name="nome" value="{{ form_data.nome }}" placeholder="Digite o nome" required>
</div>

<div class="form-group">
<label>Telefone</label>
<input type="text" name="telefone" value="{{ form_data.telefone }}" placeholder="(11) 99999-9999">
</div>

<div class="form-group">
<label>Empresa</label>
<input type="text" name="empresa" value="{{ form_data.empresa }}" placeholder="Nome da empresa">
</div>

<div class="acoes">

<button class="btn">Salvar Cliente</button>

<a href="/clientes" class="btn-cancelar">Cancelar</a>

</div>

</form>

</div>

{% endblock %}

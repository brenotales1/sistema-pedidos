{% extends "base.html" %}

{% block content %}

<link rel="stylesheet" href="{{ url_for('static', filename='css/novo.css') }}">

<h2>Novo Pedido</h2>

<form class="form-pedido">

<div class="form-group">
<label>Cliente</label>

<div class="cliente-row">
<select>
<option>Selecionar</option>
<option>João</option>
<option>Maria</option>
</select>

<button type="button" class="btn-sec">+ Novo Cliente</button>
</div>

</div>


<div class="form-row">

<div>
<label>Material</label>
<select>
<option>Adesivo</option>
<option>Lona</option>
<option>ACM</option>
</select>
</div>

<div>
<label>Tipo</label>
<select>
<option>Blackout</option>
<option>Translúcido</option>
</select>
</div>

</div>


<div class="form-row">

<div>
<label>Largura</label>
<input type="number">
</div>

<div>
<label>Altura</label>
<input type="number">
</div>

</div>


<div class="form-group">

<label>Unidade</label>

<div class="radio-group">

<label><input type="radio" name="unidade"> cm</label>
<label><input type="radio" name="unidade"> m</label>

</div>

</div>


<div class="form-group">
<label>Quantidade</label>
<input type="number" value="1">
</div>


<div class="form-group">
<label>Arquivo</label>
<input type="file">
</div>


<hr>

<div class="resultado-box">

<div>
Área
<strong>0.00 m²</strong>
</div>

<div>
Valor
<strong>R$ 0.00</strong>
</div>

</div>


<div class="acoes">

<button class="btn">Salvar Pedido</button>
<a href="/pedidos" class="btn-cancelar">Cancelar</a>

</div>

</form>

{% endblock %}
